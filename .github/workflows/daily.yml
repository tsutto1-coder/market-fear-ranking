name: 市場恐怖度ランキング 毎日生成

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: フォントをインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk

      - name: パッケージをインストール
        run: pip install -q yfinance anthropic pillow matplotlib

      - name: APIキーの確認
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "❌ ANTHROPIC_API_KEY が未登録です"
            exit 1
          else
            echo "✅ ANTHROPIC_API_KEY は登録されています"
          fi

      - name: 画像を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_image.py

      - name: 生成されたファイルを確認
        run: |
          echo "=== 生成されたファイル一覧 ==="
          ls -la ranking_*.jpg 2>/dev/null || echo "❌ ranking_*.jpg が見つかりません"

      - name: 画像を保存
        uses: actions/upload-artifact@v4
        with:
          name: ranking-image
          path: ranking_*.jpg
          if-no-files-found: error
          retention-days: 30
