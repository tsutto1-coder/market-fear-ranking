name: 市場恐怖度ランキング 毎日生成

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: フォントをインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk

      - name: パッケージをインストール
        run: pip install -q yfinance anthropic pillow matplotlib

      - name: 画像を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_image.py

      - name: 画像を保存（ここからダウンロードできる）
        uses: actions/upload-artifact@v4
        with:
          name: ranking-image
          path: ranking_*.jpg
          retention-days: 7
